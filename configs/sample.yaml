project: HSGD-DR
dataset: sample
seed: 42

paths:
  raw_dir: data/sample/raw
  graph_dir: outputs/sample/graph
  run_dir: outputs/sample/run
  cv_folds_dir: outputs/sample/cv_folds
  cv_run_dir: outputs/sample/cv_run

preprocessing:
  drug_disease: data/sample/raw/drug_disease.csv
  drug_protein: data/sample/raw/drug_protein.csv
  disease_protein: data/sample/raw/disease_protein.csv
  val_ratio: 0.20
  test_ratio: 0.20
  neg_ratio: 3
  train_neg_ratio: 2

features:
  drug_features: data/sample/raw/drug_features.csv
  disease_features: data/sample/raw/disease_features.csv
  protein_features: data/sample/raw/protein_features.csv
  missing: zero

training:
  hidden_dim: 32
  num_layers: 2
  epochs: 10
  lr: 0.001
  weight_decay: 0.00001
  dropout: 0.10
  proj_dim: 32
  bpr_negatives_per_positive: 1
  lambda_cl: 0.10
  cl_temperature: 0.20
  gate_init: -2.0
  monitor: aupr
  eval_every: 2

